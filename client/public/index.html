<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Atlas</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
    }

    canvas {
      display: block;
    }

    #overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: monospace;
      background: rgba(0,0,0,0.55);
      padding: 8px;
      max-width: 520px;
      white-space: pre-wrap;
      z-index: 10;
    }

    #close-inspect {
      float: right;
      margin-left: 12px;
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
      cursor: pointer;
    }

    #overlay-content {
      white-space: pre-wrap;
    }

    #context-menu {
      position: absolute;
      display: none;
      color: white;
      font-family: monospace;
      background: rgba(20,20,20,0.94);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 4px;
      z-index: 20;
      min-width: 120px;
    }

    .context-item {
      padding: 6px 10px;
      cursor: pointer;
    }

    .context-item:hover {
      background: rgba(255,255,255,0.15);
    }
  </style>
</head>

<body>
  <div id="overlay">
    <button id="close-inspect">×</button>
    <div id="overlay-content">Atlas Prototype 0</div>
  </div>

  <div id="context-menu">
    <div id="inspect-action" class="context-item">Inspect</div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
