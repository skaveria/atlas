<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Atlas</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
    }

    canvas {
      display: block;
    }

    #overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: monospace;
      background: rgba(0,0,0,0.55);
      padding: 8px;
      max-width: 520px;
      white-space: pre-wrap;
      z-index: 10;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(4px);
    }

    #close-inspect {
      float: right;
      margin-left: 12px;
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
      cursor: pointer;
      font-family: monospace;
    }

    #close-inspect:hover {
      background: rgba(255,255,255,0.22);
    }

    #overlay-content {
      white-space: pre-wrap;
    }

    #context-menu {
      position: absolute;
      display: none;
      color: white;
      font-family: monospace;
      background: rgba(20,20,20,0.94);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 4px;
      z-index: 20;
      min-width: 120px;
      backdrop-filter: blur(4px);
    }

    .context-item {
      padding: 6px 10px;
      cursor: pointer;
    }

    .context-item:hover {
      background: rgba(255,255,255,0.15);
    }

    .inspect-title {
      color: #d7ffd7;
      margin-bottom: 12px;
    }

    .inspect-section {
      color: #88aaff;
      margin-top: 10px;
      margin-bottom: 4px;
      font-weight: bold;
    }

    .inspect-name {
      color: #ffffff;
    }

    .inspect-examine {
      color: #d8cfa8;
      line-height: 1.35;
    }

    .edn-record {
      margin: 0;
      color: #dddddd;
      white-space: pre-wrap;
      line-height: 1.3;
    }

    .edn-keyword {
      color: #91d991;
    }

    .edn-string {
      color: #d8cfa8;
    }

    .edn-number {
      color: #9fc7ff;
    }

    .edn-bracket {
      color: #c586c0;
    }
  </style>
</head>

<body>
  <div id="overlay">
    <button id="close-inspect">×</button>
    <div id="overlay-content">Atlas Prototype 0</div>
  </div>

  <div id="context-menu">
    <div id="inspect-action" class="context-item">
      Inspect
    </div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
